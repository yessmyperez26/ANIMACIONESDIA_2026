<html> 
<head>
    <title>ANIMACION 2</title>
    <style>
        *{
            padding: 0px;
            margin:0px;
        }
        .contenedor{
            width: 400px;
            height: 200px;
            border: 1px solid black;
            position: relative;/*para centrar el div*/
            margin: 0 auto; /*para centrar el div*/
            overflow: hidden;/* muestra solo lo interior*/
        }

        .cuadrito{
            width: 100px;
            height: 100px;
            background-color: red;
            position: absolute;/*permite mover el div dentro del contenedor*/
            top: 200px;
            left: 100px;
            
            animation : cuadrito 3s infinite ease-in;
        }
        @keyframes cuadrito{
            from{
                top: -100px;
            }
            to{
                top: 500px;
            }
        }
    </style>
</head>
<body>
    <div class="contenedor">

        <div class="cuadrito"></div>

    </div>

    


</body>
</html>
