<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Sandy Yessmy Perez Agapito</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Playfair+Display:wght@600&family=Poppins:wght@300;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: url("fondo.jpg") no-repeat center center/cover;
    height: 100vh;
    overflow: hidden;
}
body::before {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.5);
    z-index: 0;
}

#start {
    position: absolute;
    top: 40%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: #ff66b2;
    color: white;
    padding: 12px 22px;
    border-radius: 15px;
    cursor: pointer;
    z-index: 3;
    box-shadow: 0 0 15px #ff99cc;
}

.titulo-grande {
    position: absolute;
    top: 8%;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Playfair Display', serif;
    font-size: clamp(30px, 3vw, 48px);
    color: #ffd6f6;
    z-index: 2;
    text-align: center;
}

.titulo-grande span {
    opacity: 0;
    display: inline-block;
    text-shadow: 0 0 8px #ff99cc;
    animation: aparecer 0.3s forwards;
}
.nombre {
    font-family: 'Dancing Script', cursive;
    font-size: clamp(30px, 3vw, 45px);
    display: block;
    margin-top: 10px;
    color: #ffb6e6;
    letter-spacing: 2px;
}

.nombre span {
    margin-right: 2px;
}

@keyframes aparecer {
    to { opacity: 1; }
}

.corazon {
    position: absolute;
    color: #ff99cc;
    font-size: 16px;
    animation: flotar 4s linear infinite;
}

@keyframes flotar {
    0% { transform: translateY(100vh); }
    100% { transform: translateY(-10vh); opacity: 0; }
}

.contenedor {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    padding: 25px 35px;
    border-radius: 20px;
    width: 360px;
    text-align: center;
    z-index: 2;
    box-shadow: 0px 10px 30px rgba(255,182,193,0.4);
    opacity: 0;
    animation: aparecerContenido 2s ease forwards;
    animation-delay: 4s;
}

@keyframes aparecerContenido {
    to { opacity: 1; }
}

h2 {
    color: white;
    font-family: 'Playfair Display', serif;
}

ol {
    list-style: none;
    padding: 0;
}

li {
    margin: 12px 0;
}

a {
    text-decoration: none;
    color: white;
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 15px;
    border-radius: 15px;
    background: rgba(255, 182, 193, 0.2);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.3);
    box-shadow: 0 5px 15px rgba(255, 105, 180, 0.3);
    transition: all 0.3s ease;
}

a:hover {
    transform: translateY(-5px) scale(1.03);
    background: linear-gradient(45deg, #ff99cc, #ff66b2);
    box-shadow: 0 10px 25px rgba(255, 105, 180, 0.6);
}

a i {
    font-size: 20px;
}

footer {
    position: absolute;
    bottom: 20px;
    width: 100%;
    display: flex;
    justify-content: center;
    z-index: 2;
}

.footer-box {
    display: flex;
    gap: 15px;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    padding: 10px 20px;
    border-radius: 20px;
    box-shadow: 0 5px 15px rgba(255, 182, 193, 0.4);
}

.footer-box a {
    color: #ffd6f6;
    font-size: 20px;
    transition: 0.3s;
}

.footer-box a:hover {
    color: #ff66b2;
    transform: scale(1.2);
}
</style>
</head>

<body>

<audio id="teclado" src="https://www.soundjay.com/mechanical/sounds/keyboard-1.mp3"></audio>

<div id="start" onclick="iniciar()">Haz clic para iniciar 💗</div>

<div class="titulo-grande" id="titulo"></div>

<div class="corazon" style="left:10%;">💗</div>
<div class="corazon" style="left:30%;">💖</div>
<div class="corazon" style="left:50%;">💗</div>
<div class="corazon" style="left:70%;">💖</div>
<div class="corazon" style="left:90%;">💗</div>

<div class="contenedor">
    <h2> MIS PROYECTOS</h2>

    <ol>
        <li><a href="SEMANA1/index.html"><i class="fa-solid fa-chess-board"></i>Proyecto 1 - Ajedrez</a></li>
        <li><a href="SEMANA2/index.html"><i class="fa-solid fa-wand-magic-sparkles"></i>Proyecto 2 - Animación Básica</a></li>
        <li><a href="SEMANA3/index.html"><i class="fa-solid fa-star"></i>Proyecto 3 - Movimientos</a></li>
        <li><a href="SEMANA4/index.html"><i class="fa-solid fa-heart"></i>Proyecto 4 - Animación por Pasos</a></li>
    </ol>
</div>

<footer>
    <div class="footer-box">
        <a href="https://github.com/?locale=es-419"><i class="fab fa-github"></i></a>
    </div>
</footer>

<script>
const texto1 = "BIENVENIDOS";
const texto2 = "Sandy Yessmy Perez Agapito";
const contenedor = document.getElementById("titulo");
const audio = document.getElementById("teclado");

function iniciar() {
    document.getElementById("start").style.display = "none";

    let delay = 0;

    texto1.split("").forEach((letra, i) => {
        setTimeout(() => {
            const span = document.createElement("span");
            span.textContent = letra;
            contenedor.appendChild(span);
            audio.currentTime = 0;
            audio.play();
        }, delay + i * 100);
    });

    delay += texto1.length * 100 + 500;

    setTimeout(() => {
        const nombreDiv = document.createElement("div");
        nombreDiv.classList.add("nombre");
        contenedor.appendChild(nombreDiv);

        texto2.split("").forEach((letra, i) => {
            setTimeout(() => {
                const span = document.createElement("span");
                span.textContent = letra;
                nombreDiv.appendChild(span);
                audio.currentTime = 0;
                audio.play();
            }, i * 120); 
        });

    }, delay);
}
</script>

</body>
</html>
