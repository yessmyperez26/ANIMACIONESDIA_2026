/* BOTÓN VOLVER (AHORA ABAJO) */
.btn-volver{
    display: block;
    margin: 40px auto;
    background: #ff66b2;
    color: white;
    border: none;
    padding: 12px 22px;
    border-radius: 12px;
    cursor: pointer;
    font-size: 16px;
    box-shadow: 0 0 10px #ff99cc;
    transition: 0.3s;
}

.btn-volver:hover{
    background: #ff99cc;
    transform: scale(1.05);
}

#cuadrito1, #cuadrito2{

    width: 100px;
    display: inline-block;
}
